<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IROA Video Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Spray+Paint&display=swap" rel="stylesheet">
<style>

body{
  margin:0;
  font-family: Arial;
  background:#2b2d31;
  color:white;
  text-align:center;
}

.logo-text{
  font-family:'Rubik Spray Paint', cursive;
  font-size:40px;
  color:#f1f1f1;
}

/* barra superior */

.topbar{
  position:absolute;
  top:15px;
  left:20px;
}

.logo{
  width:60px;
}

/* título */

h1{
  margin-top:20px;
}

/* contenedor video */

.video-container{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

video{
  width:400px;
  border-radius:10px;
  background:black;
}

/* chat */

#chat{
  width:500px;
  margin:30px auto;
  background:#313338;
  padding:15px;
  border-radius:10px;
}

#messages{
  height:150px;
  overflow-y:auto;
  background:#1e1f22;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
}

input{
  width:70%;
  padding:8px;
  border:none;
  border-radius:5px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:5px;
  background:#2c3bdb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2c38be;
}

</style>

<link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<body>

<header class="topbar">
<div class="logo-text">IROA.V</div>
</header>

<h1>Video 📷 Chat</h1>
<p id="status">Esperando usuario...</p>

<div class="video-container">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<div id="chat" style="display:none;">
  <div id="messages"></div>
  <input id="input" placeholder="Escribe..." />
  <button onclick="sendMessage()">Enviar</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const status = document.getElementById("status");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");

let pc;
let localStream;

// Pedir acceso a cámara
navigator.mediaDevices.getUserMedia({ video:true, audio:true })
.then(stream => {
  localVideo.srcObject = stream;
  localStream = stream;
})
.catch(err => {
  console.log("Usuario sin cámara, usando solo chat");
  status.innerText = "Modo chat (sin cámara)";
  localStream = new MediaStream();
});

socket.on("waiting", () => status.innerText = "Esperando usuario...");

socket.on("matched", async () => {

  status.innerText = "Conectado!";
  chat.style.display = "block";

  pc = new RTCPeerConnection();

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (event) => {
    remoteVideo.srcObject = event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if(event.candidate) socket.emit("signal", { candidate: event.candidate });
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal", { sdp: pc.localDescription });

});

socket.on("signal", async (data) => {

  if(!pc){
    pc = new RTCPeerConnection();

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
    };

    pc.onicecandidate = (event) => {
      if(event.candidate) socket.emit("signal", { candidate: event.candidate });
    };
  }

  if(data.sdp){
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

    if(data.sdp.type === "offer"){
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("signal", { sdp: pc.localDescription });
    }
  }

  else if(data.candidate){
    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
  }

});

socket.on("partnerDisconnected", () => {

  status.innerText = "El usuario se desconectó.";
  remoteVideo.srcObject = null;

  if(pc) pc.close();

});

socket.on("chat", (msg) => {

  const div = document.createElement("div");
  div.innerText = "Extraño: " + msg;
  messages.appendChild(div);

});

function sendMessage(){

  const msg = input.value;

  if(msg){

    const div = document.createElement("div");
    div.innerText = "Tú: " + msg;
    messages.appendChild(div);

    socket.emit("chat", msg);

    input.value = "";

  }

}

</script>

<div style="margin-top:20px;">
<button onclick="location.reload()">NEXT</button>
</div>

</body>
</html>
